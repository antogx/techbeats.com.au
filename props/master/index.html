}
.control label {

}
input[type="text"], select, textarea {

  border:1px solid var(--line);
  border-radius:8px;
  padding:4px 7px;
  background:#fff;
  color:var(--fg);

}
textarea {

}

}

function moneyOnly(v) {
  return String(v ?? "").replace(/[^0-9.]/g, "");
}

function ownerBadgeStyle(ownerKey) {
  const owner = ownerMap[ownerKey];
  return `background:${owner?.color || "#f8fafc"};`;
}

function currentOwnerName() {
  return ownerMap[state.currentOwner]?.name || state.currentOwner || "";
}

function compactFields() {
  return fields.filter(f => !!f.compact);
}

function detailedFields() {
  return fields;
}

function fieldWidthClass(field) {
  const w = field.width || "m";
  if (w === "s") return "fld-s";
  if (w === "l") return "fld-l";
  return "fld-m";
}

function updateFirebaseStatus(text, good=true) {
  const el = document.getElementById("firebaseStatus");
  if (!el) return;
  el.textContent = "Firebase: " + text;
  el.style.color = good ? "#166534" : "#991b1b";
}

function getComputedDoc(propId) {
  const src = state.sourceMap.get(propId);
  const dbDoc = state.docs.get(propId) || {};
  const assignedOwner = dbDoc.ownerKey || initialAssignments[propId] || owners[0]?.key || "";
  return {
    propId,
    property: src?.property || "",
    address: src?.address || "",
    addressNorm: src?.addressNorm || "",
    sourceStatus: src?.sourceStatus || "Available",
    ownerKey: assignedOwner,
    ownerName: ownerMap[assignedOwner]?.name || assignedOwner,
    archived: !!dbDoc.archived,
    manualOwner: !!dbDoc.manualOwner,
    formData: dbDoc.formData || {},
    updatedAtMs: dbDoc.updatedAtMs || 0,
    updatedBy: dbDoc.updatedBy || "",
  };
}

function buildOwnerOptions(selected) {
  return owners.map(o => `<option value="${esc(o.key)}" ${o.key === selected ? "selected" : ""}>${esc(o.name)}</option>`).join("");
}

function buildOwnerSelect(docData) {
  return `
    <select class="owner-select" data-prop="${esc(docData.propId)}">
      ${owners.map(o => `<option value="${esc(o.key)}" ${o.key === docData.ownerKey ? "selected" : ""}>${esc(o.name)}</option>`).join("")}
    </select>`;
}

function fieldInputHtml(propId, field, value) {
  const v = value ?? "";
  const dataAttr = `data-prop="${esc(propId)}" data-field="${esc(field.key)}"`;
  const wrapClass = fieldWidthClass(field);

  if (field.type === "textarea") {
    return `<div class="fld-wrap ${wrapClass}"><label>${esc(field.label)}</label><textarea ${dataAttr} class="fld">${esc(v)}</textarea></div>`;
  }
  if (field.type === "select") {
    const opts = (field.options || []).map(opt =>
      `<option value="${esc(opt)}" ${opt === v ? "selected" : ""}>${esc(opt || "--")}</option>`
    ).join("");
    return `<div class="fld-wrap ${wrapClass}"><label>${esc(field.label)}</label><select ${dataAttr} class="fld">${opts}</select></div>`;
  }
  if (field.type === "money") {
    return `<div class="fld-wrap ${wrapClass}"><label>${esc(field.label)}</label><input ${dataAttr} class="fld fld-money" type="text" value="${esc(v)}" placeholder="$0"></div>`;
  }
  return `<div class="fld-wrap ${wrapClass}"><label>${esc(field.label)}</label><input ${dataAttr} class="fld" type="text" value="${esc(v)}"></div>`;
}

function displayFieldBadge(field, value) {
  if (!value) return "";
  const colorKey = ((field.badge_colors || {})[value] || "").toLowerCase();
  const cls = colorKey ? `pill badge-${colorKey}` : "pill";
  return `<span class="${cls}">${esc(field.label)}: ${esc(value)}</span>`;
}

function renderSummary() {
  const activeDocs = sourceRows.map(r => getComputedDoc(r.propId)).filter(d => !d.archived);
  const counts = Object.fromEntries(owners.map(o => [o.key, 0]));
  for (const d of activeDocs) counts[d.ownerKey] = (counts[d.ownerKey] || 0) + 1;

  const bits = [];
  bits.push(`<span class="pill">Active: ${activeDocs.length}</span>`);
  bits.push(`<span class="pill">User: ${esc(currentOwnerName())}</span>`);
  bits.push(`<span class="pill">View: ${esc(state.viewMode)}</span>`);
  for (const o of owners) {
    bits.push(`<span class="pill" style="${ownerBadgeStyle(o.key)}">${esc(o.name)}: ${counts[o.key] || 0}</span>`);
  }
  document.getElementById("summaryRow").innerHTML = bits.join("");
}

function matchesSearch(docData) {
  if (!state.search) return true;
  const q = state.search.toLowerCase();
  const texts = [
    docData.property,
    docData.address,
    docData.ownerName,
    ...fields.map(f => docData.formData?.[f.key] || "")
  ].join(" ").toLowerCase();
  return texts.includes(q);
}

function visibleDocs() {
  return sourceRows
    .map(r => getComputedDoc(r.propId))
    .filter(d => state.showArchived === "show" || !d.archived)
    .filter(d => state.filterMine === "all" || d.ownerKey === state.currentOwner)
    .filter(matchesSearch)
    .sort((a, b) => {
      if (a.archived !== b.archived) return a.archived ? 1 : -1;
      if (a.ownerName !== b.ownerName) return a.ownerName.localeCompare(b.ownerName);
      return a.address.localeCompare(b.address);
    });
}

function renderRow(docData) {
  const archived = !!docData.archived;
  const readOnly = state.currentOwner !== docData.ownerKey && state.adminMode !== "on";
  const usedFields = state.viewMode === "compact" ? compactFields() : detailedFields();
  const fieldHtml = usedFields.map(f => fieldInputHtml(docData.propId, f, docData.formData?.[f.key] || "")).join("");
  const badges = compactFields()
    .slice(0, 4)
    .map(f => displayFieldBadge(f, docData.formData?.[f.key] || ""))
    .filter(Boolean)
    .join("");

  return `
  <div class="row ${archived ? "archived-row" : ""} ${state.viewMode === "compact" ? "compact" : "detail"}" data-prop="${esc(docData.propId)}">
    <div class="row-head" style="${ownerBadgeStyle(docData.ownerKey)}">
      <div class="titlebox">
        <div><a class="property-link" href="${esc(docData.property)}" target="_blank" rel="noopener">${esc(docData.property || "Listing")}</a></div>
        <div class="addr">${esc(docData.address)}</div>
      </div>

      <div class="status-pack">
        <span class="owner-tag" style="${ownerBadgeStyle(docData.ownerKey)}">${esc(docData.ownerName)}</span>
        <span class="pill">${docData.manualOwner ? "Manual" : "Auto"}</span>
      </div>

      <div class="status-pack">
        <span class="pill">${archived ? "Archived" : "Active"}</span>
        <span class="pill">Status: ${esc(docData.sourceStatus)}</span>
      </div>

      <div class="status-pack">
        ${badges}
      </div>

      <div class="row-actions">
        ${buildOwnerSelect(docData)}
        <button class="btn btn-primary save-btn" data-prop="${esc(docData.propId)}">Save</button>
        ${archived
          ? `<button class="btn btn-soft unarchive-btn" data-prop="${esc(docData.propId)}">Unarchive</button>`
          : `<button class="btn btn-archive archive-btn" data-prop="${esc(docData.propId)}">Archive</button>`}
        <span class="save-state" id="save-state-${esc(docData.propId)}"></span>
      </div>
    </div>

    <div class="row-body">
      <div class="${state.viewMode === "compact" ? "compact-grid" : "detail-grid"}">
        ${fieldHtml}
      </div>
      <div class="small-note" style="margin-top:4px;">
        ${docData.updatedAtMs ? ("Saved: " + new Date(docData.updatedAtMs).toLocaleString()) : ""}
        ${docData.updatedBy ? (" · By: " + docData.updatedBy) : ""}
        ${readOnly ? " · Locked for other users" : ""}
      </div>
    </div>
  </div>`;
}

function applyReadonlyRules() {
  document.querySelectorAll(".row").forEach(row => {
    const propId = row.getAttribute("data-prop") || "";
    const docData = getComputedDoc(propId);
    const readOnly = state.currentOwner !== docData.ownerKey && state.adminMode !== "on";

    row.querySelectorAll(".fld, .save-btn, .archive-btn, .unarchive-btn").forEach(el => {
      el.disabled = readOnly || !state.firebaseReady;
    });

    const ownerSelect = row.querySelector(".owner-select");
    if (ownerSelect) ownerSelect.disabled = state.adminMode !== "on" || !state.firebaseReady;
  });
}

function render() {
  renderSummary();
  const docs = visibleDocs();
  document.getElementById("activeList").innerHTML =
    docs.map(d => renderRow(d)).join("") || '<div class="small-note" style="padding:8px;">No properties found.</div>';
  document.getElementById("currentOwner").innerHTML = buildOwnerOptions(state.currentOwner);
  applyReadonlyRules();
}

async function ensureFirebaseReady() {
  try {
    await signInAnonymously(auth);
    state.firebaseReady = true;
    state.firebaseError = "";
    updateFirebaseStatus("connected", true);
  } catch (err) {
    state.firebaseReady = false;
    state.firebaseError = err?.message || String(err);
    updateFirebaseStatus("auth failed - " + state.firebaseError, false);
    throw err;
  }
}

async function loadDb() {
  if (!state.firebaseReady) return;
  const snap = await getDocs(collection(db, collectionName));
  snap.forEach(d => {
    state.docs.set(d.id, d.data() || {});
  });
}

function gatherFormData(propId) {
  const out = {};
  document.querySelectorAll(`.fld[data-prop="${CSS.escape(propId)}"]`).forEach(el => {
    const key = el.getAttribute("data-field") || "";
    let value = el.value ?? "";
    const field = fieldMap[key] || {};
    if (field.type === "money") {
      value = moneyOnly(value);
      if (value) value = "$" + Number(value).toLocaleString();
    }
    out[key] = value;
  });
  return out;
}

function setSaveState(propId, text, good=true) {
  const el = document.getElementById(`save-state-${propId}`);
  if (!el) return;
  el.textContent = text;
  el.style.color = good ? "#166534" : "#991b1b";
}

async function saveProp(propId, opts={}) {
  if (!state.firebaseReady) throw new Error(state.firebaseError || "Firebase not ready");

  const docData = getComputedDoc(propId);
  const formData = gatherFormData(propId);
  const ownerSelect = document.querySelector(`.owner-select[data-prop="${CSS.escape(propId)}"]`);
  const desiredOwner = ownerSelect ? ownerSelect.value : docData.ownerKey;
  const hadDoc = state.docs.get(propId) || {};
  const ownerChanged = desiredOwner !== docData.ownerKey;
  const manualOwner = state.adminMode === "on" && ownerChanged ? true : !!hadDoc.manualOwner;

  const payload = {
    propId,
    property: docData.property,
    address: docData.address,
    addressNorm: docData.addressNorm,
    sourceStatus: docData.sourceStatus,
    ownerKey: desiredOwner,
    ownerName: ownerMap[desiredOwner]?.name || desiredOwner,
    manualOwner,
    archived: !!opts.archived,
    formData,
    updatedAt: serverTimestamp(),
    updatedAtMs: Date.now(),
    updatedBy: state.currentOwner,
  };

  await setDoc(doc(db, collectionName, propId), payload, { merge: true });
  state.docs.set(propId, { ...(state.docs.get(propId) || {}), ...payload });
  setSaveState(propId, "Saved");
  render();
}

async function archiveProp(propId, archived) {
  if (!state.firebaseReady) throw new Error(state.firebaseError || "Firebase not ready");

  const payload = {
    archived: !!archived,
    updatedAt: serverTimestamp(),
    updatedAtMs: Date.now(),
    updatedBy: state.currentOwner,
  };
  await setDoc(doc(db, collectionName, propId), payload, { merge: true });
  state.docs.set(propId, { ...(state.docs.get(propId) || {}), ...payload, archived: !!archived });
  render();
}

function previewRebalance() {
  const active = sourceRows.map(r => getComputedDoc(r.propId)).filter(d => !d.archived);
  const today = new Date();
  const weights = {};
  let total = 0;

  for (const o of owners) {
    const joined = new Date(o.join_date + "T00:00:00");
    const days = Math.max(1, Math.floor((today - joined) / 86400000) + 1);
    const weight = Math.sqrt(days);
    weights[o.key] = weight;
    total += weight;
  }
  for (const k of Object.keys(weights)) weights[k] = total ? weights[k] / total : 0;

  const counts = Object.fromEntries(owners.map(o => [o.key, 0]));
  for (const d of active) counts[d.ownerKey] = (counts[d.ownerKey] || 0) + 1;

  const lines = owners.map(o => `${o.name}: current ${counts[o.key] || 0}, target share ${(weights[o.key]*100).toFixed(1)}%`);
  alert("Tenure-aware allocation preview\n\n" + lines.join("\n"));
}

function initToolbar() {
  const ownerSel = document.getElementById("currentOwner");
  state.currentOwner = localStorage.getItem("master_props_current_owner") || owners[0]?.key || "";
  state.viewMode = localStorage.getItem("master_props_view_mode") || "compact";

  ownerSel.value = state.currentOwner;
  document.getElementById("viewMode").value = state.viewMode;

  ownerSel.addEventListener("change", () => {
    state.currentOwner = ownerSel.value;
    localStorage.setItem("master_props_current_owner", state.currentOwner);
    render();
  });

  document.getElementById("searchBox").addEventListener("input", (e) => {
    state.search = (e.target.value || "").trim();
    render();
  });

  document.getElementById("filterMine").addEventListener("change", (e) => {
    state.filterMine = e.target.value || "all";
    render();
  });

  document.getElementById("showArchived").addEventListener("change", (e) => {
    state.showArchived = e.target.value || "hide";
    render();
  });

  document.getElementById("adminMode").addEventListener("change", (e) => {
    state.adminMode = e.target.value || "off";
    render();
  });

  document.getElementById("viewMode").addEventListener("change", (e) => {
    state.viewMode = e.target.value || "compact";
    localStorage.setItem("master_props_view_mode", state.viewMode);
    render();
  });

  document.getElementById("recalcBtn").addEventListener("click", previewRebalance);
}

function attachEvents() {
  document.addEventListener("click", async (e) => {
    const saveBtn = e.target.closest(".save-btn");
    if (saveBtn) {
      const propId = saveBtn.getAttribute("data-prop") || "";
      try {
        const docData = getComputedDoc(propId);
        setSaveState(propId, "Saving...", true);
        await saveProp(propId, { archived: !!docData.archived });
      } catch (err) {
        console.error(err);
        setSaveState(propId, "Failed", false);
        alert("Save failed: " + (err?.message || err));
      }
      return;
    }

    const archiveBtn = e.target.closest(".archive-btn");
    if (archiveBtn) {
      const propId = archiveBtn.getAttribute("data-prop") || "";
      try {
        const docData = getComputedDoc(propId);
        await saveProp(propId, { archived: !!docData.archived });
        await archiveProp(propId, true);
      } catch (err) {
        console.error(err);
        alert("Archive failed: " + (err?.message || err));
      }
      return;
    }

    const unarchiveBtn = e.target.closest(".unarchive-btn");
    if (unarchiveBtn) {
      const propId = unarchiveBtn.getAttribute("data-prop") || "";
      try {
        await archiveProp(propId, false);
      } catch (err) {
        console.error(err);
        alert("Unarchive failed: " + (err?.message || err));
      }
      return;
    }
  });
}

(async () => {
  initToolbar();
  render();

  try {
    await ensureFirebaseReady();
    await loadDb();
  } catch (err) {
    console.error(err);
  }

  render();
  attachEvents();
})();
</script>
</body>
</html>
